<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS Admin Panel</title>
    <link rel="stylesheet" href="admin.css">
</head>

<body>
    <div class="login-container" id="loginContainer">
        <div class="login-card">
            <h2>Вхід у TinyCMS</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Логін</label>
                    <input type="text" id="loginUsername" class="form-control" placeholder="Введіть логін (admin)"
                        required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="loginPassword" class="form-control"
                        placeholder="Введіть пароль (password123)" required>
                </div>
                <div id="loginError" class="login-error"></div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Увійти</button>
            </form>
        </div>
    </div>

    <div class="admin-container" id="adminContainer" style="display: none;">
        <header class="admin-header">
            <h1>TinyCMS</h1>
            <div class="actions">
                <button id="btnLogout" class="btn btn-secondary">Вийти</button>
                <button id="btnLoad" class="btn btn-secondary">Оновити</button>
                <button id="btnSave" class="btn btn-primary">Зберегти на сайт</button>
            </div>
        </header>

        <div id="editorContainer" class="editor-container">
            <div class="loader">Loading content...</div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>

</html>
